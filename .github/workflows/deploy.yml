name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force-push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote remove huggingface 2>/dev/null || true
          git remote add huggingface "https://Maneet-B:${HF_TOKEN}@huggingface.co/spaces/Maneet-B/e57-to-point-cloud"
          git push huggingface HEAD:main --force
