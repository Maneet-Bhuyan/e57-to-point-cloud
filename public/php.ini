; E57 Meshify — PHP settings for large .e57 uploads
; Hostinger: upload as php.ini OR copy these lines into .user.ini in public_html

upload_max_filesize = 1024M
post_max_size = 1024M
max_execution_time = 600
max_input_time = 600
memory_limit = 512M
max_file_uploads = 20

; Recommended for API proxy stability
default_socket_timeout = 600
